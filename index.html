<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake — Two Players</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --border: #2a2a3a;
    --text: #e8e8f0;
    --muted: #5a5a7a;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    padding: 24px;
  }

  h1 {
    font-size: 11px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--muted);
  }

  #hud {
    display: flex;
    gap: 0;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    width: 480px;
    justify-content: space-between;
  }

  .p-hud {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .p-hud.right { text-align: right; }

  .p-label {
    font-size: 9px;
    letter-spacing: 0.2em;
    color: var(--muted);
  }

  .p-score {
    font-size: 20px;
    font-weight: 700;
    line-height: 1;
  }

  .p-exp {
    font-size: 10px;
    color: var(--muted);
  }
  .p-exp b { font-weight: 700; }

  #game-wrap {
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
    box-shadow: 0 0 60px rgba(124,106,245,0.08);
  }

  canvas { display: block; cursor: crosshair; }

  #msg {
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    height: 14px;
    transition: color 0.3s;
  }
  #msg.flash { color: var(--text); }

  #controls {
    display: flex;
    gap: 48px;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-align: center;
    line-height: 1.9;
  }

  .ctrl-col { display: flex; flex-direction: column; align-items: center; gap: 2px; }
  .ctrl-title { font-size: 9px; letter-spacing: 0.2em; margin-bottom: 2px; }
</style>
</head>
<body>

<h1>Snake &mdash; Two Players</h1>

<div id="hud">
  <div class="p-hud left">
    <div class="p-label" id="p1-label">Player 1</div>
    <div class="p-score" id="p1-score">0</div>
    <div class="p-exp">Explosions <b id="p1-exp">0</b></div>
  </div>
  <div style="font-size:10px;color:var(--muted);letter-spacing:.1em;align-self:center;">Apples <b id="apple-count" style="color:var(--text)">0</b></div>
  <div class="p-hud right">
    <div class="p-label" id="p2-label">Player 2</div>
    <div class="p-score" id="p2-score">0</div>
    <div class="p-exp">Explosions <b id="p2-exp">0</b></div>
  </div>
</div>

<div id="game-wrap">
  <canvas id="game-canvas" width="480" height="480"></canvas>
</div>

<div id="msg">Click either snake to explode it!</div>

<div id="controls">
  <div class="ctrl-col">
    <div class="ctrl-title" style="color:#4ade80">Player 1</div>
    <div>W A S D to move</div>
  </div>
  <div class="ctrl-col">
    <div class="ctrl-title" style="color:#60a5fa">Player 2</div>
    <div>Arrow keys to move</div>
  </div>
</div>

<script>
const canvas = document.getElementById('game-canvas');
const ctx = canvas.getContext('2d');
const msgEl = document.getElementById('msg');

const COLS = 24, ROWS = 24, CELL = 20;

const P1_COLORS = ['#4ade80','#34d399','#86efac','#a3e635','#facc15'];
const P2_COLORS = ['#60a5fa','#38bdf8','#a78bfa','#f472b6','#fb923c'];

function rndFrom(arr, exclude) {
  let c; do { c = arr[Math.floor(Math.random()*arr.length)]; } while(c===exclude);
  return c;
}

let snakes, apples, particles, gameLoop, appleTimer;

function makeSnake(id, cx, cy, dx, colorArr) {
  return {
    id,
    body: [{x:cx,y:cy},{x:cx-dx,y:cy},{x:cx-2*dx,y:cy}],
    dir: {x:dx,y:0},
    nextDir: {x:dx,y:0},
    color: rndFrom(colorArr, null),
    colorArr,
    score: 0,
    explosions: 0,
    alive: true
  };
}

function initGame() {
  apples = []; particles = [];
  snakes = [
    makeSnake(0,  6, 12,  1, P1_COLORS),
    makeSnake(1, 17, 12, -1, P2_COLORS)
  ];
  updateHUD();
  spawnApple(); spawnApple(); spawnApple();
  clearInterval(gameLoop);
  clearInterval(appleTimer);
  gameLoop = setInterval(tick, 140);
  appleTimer = setInterval(() => {
    if (apples.length < 8) { spawnApple(); updateAppleCount(); }
  }, 3000);
}

function updateHUD() {
  document.getElementById('p1-score').textContent = snakes[0].score;
  document.getElementById('p1-exp').textContent   = snakes[0].explosions;
  document.getElementById('p1-label').style.color = snakes[0].color;
  document.getElementById('p2-score').textContent = snakes[1].score;
  document.getElementById('p2-exp').textContent   = snakes[1].explosions;
  document.getElementById('p2-label').style.color = snakes[1].color;
  updateAppleCount();
}
function updateAppleCount() {
  document.getElementById('apple-count').textContent = apples.length;
}

function spawnApple() {
  const occupied = new Set();
  snakes.forEach(s => s.body.forEach(b => occupied.add(b.x+','+b.y)));
  apples.forEach(a => occupied.add(a.x+','+a.y));
  let pos = {x:0,y:0};
  for (let i=0;i<300;i++) {
    pos = {x:Math.floor(Math.random()*COLS), y:Math.floor(Math.random()*ROWS)};
    if (!occupied.has(pos.x+','+pos.y)) break;
  }
  apples.push({...pos, pulse: Math.random()*Math.PI*2});
}

function explodeSnake(s) {
  s.explosions++;
  const oldColor = s.color;
  s.body.forEach(seg => {
    const cx = seg.x*CELL+CELL/2, cy = seg.y*CELL+CELL/2;
    for (let i=0;i<12;i++) {
      const angle = Math.random()*Math.PI*2;
      const speed = 1+Math.random()*4;
      particles.push({
        x:cx, y:cy,
        vx:Math.cos(angle)*speed, vy:Math.sin(angle)*speed-1,
        life:1, decay:0.015+Math.random()*0.025,
        size:2+Math.random()*5, color:oldColor,
        square:Math.random()>0.5
      });
    }
  });
  s.color = rndFrom(s.colorArr, oldColor);
  s.dir = s.id===0 ? {x:1,y:0} : {x:-1,y:0};
  s.nextDir = {...s.dir};
  updateHUD();
  flash(`P${s.id+1} respawned!`);
}

function flash(txt) {
  msgEl.textContent = txt;
  msgEl.classList.add('flash');
  clearTimeout(msgEl._t);
  msgEl._t = setTimeout(() => {
    msgEl.classList.remove('flash');
    msgEl.textContent = 'Click either snake to explode it!';
  }, 1400);
}

function stepSnake(s) {
  s.dir = {...s.nextDir};
  const head = {
    x:(s.body[0].x+s.dir.x+COLS)%COLS,
    y:(s.body[0].y+s.dir.y+ROWS)%ROWS
  };
  // hit self or other snake
  const allBodies = snakes.flatMap(sn => sn.body);
  if (allBodies.some(b => b.x===head.x && b.y===head.y)) {
    explodeSnake(s); return;
  }
  s.body.unshift(head);
  let ate = false;
  apples = apples.filter(a => {
    if (a.x===head.x && a.y===head.y) { ate=true; s.score++; return false; }
    return true;
  });
  if (ate) { updateHUD(); } else { s.body.pop(); }
}

function tick() {
  snakes.forEach(stepSnake);
  draw();
}

function hexAlpha(hex, alpha) {
  return hex + Math.round(alpha*255).toString(16).padStart(2,'0');
}

function drawSegment(x, y, color, isHead, dir) {
  const px = x*CELL+1, py = y*CELL+1, s = CELL-2;
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.roundRect(px, py, s, s, isHead ? 5 : 2);
  ctx.fill();
  if (isHead && dir) {
    ctx.fillStyle = 'rgba(0,0,0,0.75)';
    const ex=dir.x, ey=dir.y;
    const ox  = ey!==0 ? 4  : (ex>0?12:4);
    const oy  = ex!==0 ? 4  : (ey>0?12:4);
    const ox2 = ey!==0 ? 12 : ox;
    const oy2 = ex!==0 ? 12 : oy;
    ctx.beginPath(); ctx.arc(px+ox,  py+oy,  2,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(px+ox2, py+oy2, 2,0,Math.PI*2); ctx.fill();
  }
}

function draw() {
  ctx.fillStyle = '#0a0a0f';
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.strokeStyle='rgba(255,255,255,0.025)';
  ctx.lineWidth=0.5;
  for(let i=0;i<=COLS;i++){ctx.beginPath();ctx.moveTo(i*CELL,0);ctx.lineTo(i*CELL,canvas.height);ctx.stroke();}
  for(let j=0;j<=ROWS;j++){ctx.beginPath();ctx.moveTo(0,j*CELL);ctx.lineTo(canvas.width,j*CELL);ctx.stroke();}

  apples.forEach(a => {
    a.pulse=(a.pulse+0.07)%(Math.PI*2);
    const r=5+Math.sin(a.pulse)*1.2;
    const px=a.x*CELL+CELL/2, py=a.y*CELL+CELL/2;
    ctx.shadowColor='#ef4444'; ctx.shadowBlur=8;
    ctx.fillStyle='#ef4444';
    ctx.beginPath(); ctx.arc(px,py,r,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#86efac';
    ctx.fillRect(px-1,py-r-3,2,5);
    ctx.shadowBlur=0;
  });

  snakes.forEach(s => {
    const n=s.body.length;
    s.body.forEach((seg,i) => {
      const alpha = i===0 ? 1 : 0.55+0.45*(1-i/n);
      const color = i===0 ? s.color : hexAlpha(s.color, alpha);
      drawSegment(seg.x, seg.y, color, i===0, i===0 ? s.dir : null);
    });
  });

  particles = particles.filter(p=>p.life>0);
  particles.forEach(p => {
    p.x+=p.vx; p.y+=p.vy;
    p.vy+=0.12; p.vx*=0.97;
    p.life-=p.decay;
    ctx.globalAlpha=Math.max(0,p.life);
    ctx.fillStyle=p.color;
    const s=p.size*p.life;
    if(p.square){ ctx.fillRect(p.x-s/2,p.y-s/2,s,s); }
    else { ctx.beginPath(); ctx.arc(p.x,p.y,s,0,Math.PI*2); ctx.fill(); }
    ctx.globalAlpha=1;
  });
}

canvas.addEventListener('click', e => {
  const rect=canvas.getBoundingClientRect();
  const mx=Math.floor((e.clientX-rect.left)*(canvas.width/rect.width)/CELL);
  const my=Math.floor((e.clientY-rect.top)*(canvas.height/rect.height)/CELL);
  snakes.forEach(s => { if(s.body.some(b=>b.x===mx&&b.y===my)) explodeSnake(s); });
});

document.addEventListener('keydown', e => {
  const p1map = { w:{x:0,y:-1}, s:{x:0,y:1}, a:{x:-1,y:0}, d:{x:1,y:0} };
  const p2map = { ArrowUp:{x:0,y:-1}, ArrowDown:{x:0,y:1}, ArrowLeft:{x:-1,y:0}, ArrowRight:{x:1,y:0} };
  const nd1 = p1map[e.key];
  if (nd1 && !(nd1.x===-snakes[0].dir.x && nd1.y===-snakes[0].dir.y)) {
    snakes[0].nextDir=nd1; e.preventDefault();
  }
  const nd2 = p2map[e.key];
  if (nd2 && !(nd2.x===-snakes[1].dir.x && nd2.y===-snakes[1].dir.y)) {
    snakes[1].nextDir=nd2; e.preventDefault();
  }
});

initGame();
</script>
</body>
</html>
